name: Zero-Trust Security Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  sast_and_secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Verification
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Bandit SAST Analysis
        run: uv tool run bandit -r . -lll

  dependency_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Generate Requirements & Audit
        run: |
          uv export --format requirements-txt > requirements.txt
          uv tool run pip-audit -r requirements.txt